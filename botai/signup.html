<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CUTM AI Chatbot - Sign Up</title>
    <!-- Google Sign-In API -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #efece1;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #1c1917;
        }

        .signup-container {
            background: #f7f5ee;
            border: 1.5px solid rgba(28, 25, 23, 0.28);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(107, 106, 101, 0.04), 0 1px 3px rgba(107, 106, 101, 0.02);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .logo {
            display: block;
            height: 90px;
            width: auto;
            margin: 0 auto 16px;
            mix-blend-mode: multiply;
            object-fit: contain;
        }

        .signup-title {
            font-family: 'Georgia', serif;
            font-size: 1.8rem;
            font-weight: 500;
            color: #0f172a;
            margin-bottom: 6px;
        }

        .signup-subtitle {
            color: #475569;
            margin-bottom: 24px;
            font-size: 13.5px;
        }

        .form-group {
            margin-bottom: 18px;
            text-align: left;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #475569;
            font-size: 12.5px;
        }

        .form-input {
            width: 100%;
            padding: 12px 14px;
            background: #ffffff;
            border: 1.5px solid rgba(28, 25, 23, 0.25);
            border-radius: 10px;
            font-size: 14.5px;
            outline: none;
            color: #0f172a;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            border-color: #b45309;
            box-shadow: 0 0 0 2px rgba(180, 83, 9, 0.1);
        }

        .form-input.error {
            border-color: #ef4444;
        }

        .error-message {
            color: #ef4444;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }

        .signup-button {
            width: 100%;
            padding: 13px;
            background: #0f172a;
            color: #ffffff;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 10px;
            margin-bottom: 20px;
        }

        .signup-button:hover {
            transform: translateY(-0.5px);
            background: #1e293b;
        }

        .signup-button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none;
        }

        .login-link {
            color: #475569;
            font-size: 13px;
        }

        .login-link a {
            color: #b45309;
            text-decoration: none;
            font-weight: 500;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 18px 0;
            color: #94a3b8;
            font-size: 12px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e2e8f0;
        }

        .divider span {
            padding: 0 12px;
        }

        .google-signin-btn {
            width: 100%;
            padding: 12px;
            background: #f1f5f9;
            border: 1px solid rgba(15, 23, 42, 0.06);
            border-radius: 10px;
            font-size: 14.5px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: #475569;
        }

        .google-signin-btn:hover {
            background: rgba(15, 23, 42, 0.04);
            border-color: rgba(15, 23, 42, 0.15);
        }

        .google-icon {
            width: 18px;
            height: 18px;
        }

        .success-message {
            background: rgba(16, 185, 129, 0.1);
            color: #6ee7b7;
            border: 1px solid rgba(16, 185, 129, 0.2);
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 13.5px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="signup-container">
        <img class="logo" src="/cutm_image.jpg" alt="Centurion University Logo">
        <h1 class="signup-title">Join CUTM AI</h1>
        <p class="signup-subtitle">Create your account to start chatting</p>

        <div class="success-message" id="successMessage">
            Account created successfully! You can now <a href="login.html">sign in</a>.
        </div>

        <!-- Google Sign-In Button -->
        <button class="google-signin-btn" id="googleSignUpBtn">
            <svg class="google-icon" viewBox="0 0 24 24">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Sign up with Google
        </button>

        <div class="divider">
            <span>or</span>
        </div>

        <form id="signupForm">
            <div class="form-group">
                <label for="name" class="form-label">Full Name</label>
                <input 
                    type="text" 
                    id="name" 
                    class="form-input" 
                    placeholder="Enter your full name"
                    required
                >
                <div class="error-message" id="nameError">Please enter your full name</div>
            </div>

            <div class="form-group">
                <label for="email" class="form-label">Email Address</label>
                <input 
                    type="email" 
                    id="email" 
                    class="form-input" 
                    placeholder="Enter your email"
                    required
                >
                <div class="error-message" id="emailError">Please enter a valid email address</div>
            </div>

            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    class="form-input" 
                    placeholder="Create a password (min 6 characters)"
                    required
                >
                <div class="error-message" id="passwordError">Password must be at least 6 characters</div>
            </div>

            <div class="form-group">
                <label for="confirmPassword" class="form-label">Confirm Password</label>
                <input 
                    type="password" 
                    id="confirmPassword" 
                    class="form-input" 
                    placeholder="Confirm your password"
                    required
                >
                <div class="error-message" id="confirmPasswordError">Passwords do not match</div>
            </div>

            <button type="submit" class="signup-button" id="signupButton">
                Create Account
            </button>
        </form>

        <div class="login-link">
            Already have an account? <a href="login.html">Sign in here</a>
        </div>
    </div>

    <script>
        function getCsrfToken() {
            const match = document.cookie.match(/(?:^|;\s*)csrf_token=([^;]*)/);
            return match ? decodeURIComponent(match[1]) : '';
        }
        const _origFetch = window.fetch;
        window.fetch = function(url, opts = {}) {
            if (!opts.method || opts.method.toUpperCase() === 'POST' || opts.method.toUpperCase() === 'PUT' || opts.method.toUpperCase() === 'DELETE') {
                if (!opts.headers) opts.headers = {};
                if (typeof opts.headers === 'object' && !(opts.headers instanceof Headers)) {
                    opts.headers['X-CSRF-Token'] = getCsrfToken();
                } else if (opts.headers instanceof Headers) {
                    opts.headers.set('X-CSRF-Token', getCsrfToken());
                }
            }
            return _origFetch.call(this, url, opts);
        };

        // DOM Elements
        const signupForm = document.getElementById('signupForm');
        const nameInput = document.getElementById('name');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const signupButton = document.getElementById('signupButton');
        const successMessage = document.getElementById('successMessage');

        // Initialize
        function initializeSignup() {
            signupForm.addEventListener('submit', handleSignup);
            
            // Add input event listeners to clear errors
            [nameInput, emailInput, passwordInput, confirmPasswordInput].forEach(input => {
                input.addEventListener('input', clearError);
            });

            // Redirect Google sign-up to Google sign-in on login page
            const googleSignUpBtn = document.getElementById('googleSignUpBtn');
            if (googleSignUpBtn) {
                googleSignUpBtn.addEventListener('click', () => {
                    window.location.href = 'login.html';
                });
            }

            nameInput.focus();
        }

        // Handle signup form submission
        function handleSignup(event) {
            event.preventDefault();

            const name = nameInput.value.trim();
            const email = emailInput.value.trim();
            const password = passwordInput.value.trim();
            const confirmPassword = confirmPasswordInput.value.trim();

            // Clear previous errors
            clearAllErrors();

            let hasErrors = false;

            // Validate inputs
            if (!name) {
                showError('name', 'Please enter your full name');
                hasErrors = true;
            }

            if (!validateEmail(email)) {
                showError('email', 'Please enter a valid email address');
                hasErrors = true;
            } else {
                const domain = email.split('@')[1].toLowerCase();
                if (domain !== 'cutmap.ac.in' && domain !== 'cutm.ac.in') {
                    showError('email', 'Access Restricted. Only @cutmap.ac.in or @cutm.ac.in domains are allowed.');
                    hasErrors = true;
                }
            }

            if (!validatePassword(password)) {
                showError('password', 'Password must be at least 6 characters');
                hasErrors = true;
            }

            if (password !== confirmPassword) {
                showError('confirmPassword', 'Passwords do not match');
                hasErrors = true;
            }

            if (hasErrors) return;

            // Show loading state
            signupButton.disabled = true;
            signupButton.textContent = 'Creating Account...';

            // Call registration API
            fetch('/api/auth/register', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    name: name,
                    email: email,
                    password: password
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    if (data.requires_approval) {
                        // Show pending approval message
                        successMessage.innerHTML = 'Account created successfully! Your registration is pending administrator approval. <a href="login.html" style="color: #34d399; text-decoration: underline; font-weight: 500;">Go to Sign In</a>';
                        successMessage.style.display = 'block';
                        signupForm.style.display = 'none';
                    } else {
                        // Store session token and user data (fallback)
                        localStorage.setItem('chatbotSession', data.session_token);
                        localStorage.setItem('chatbotUser', JSON.stringify(data.user));

                        // Show success message
                        successMessage.style.display = 'block';
                        signupForm.style.display = 'none';

                        // Redirect to chatbot after 3 seconds
                        setTimeout(() => {
                            window.location.href = 'index.html';
                        }, 3000);
                    }
                } else {
                    // Show error
                    signupButton.disabled = false;
                    signupButton.textContent = 'Create Account';
                    
                    if (data.error && data.error.includes('already exists')) {
                        showError('email', 'An account with this email already exists');
                    } else {
                        showError('email', data.error || 'Registration failed');
                    }
                }
            })
            .catch(error => {
                console.error('Registration error:', error);
                signupButton.disabled = false;
                signupButton.textContent = 'Create Account';
                showError('email', 'Network error. Please try again.');
            });
        }

        // Validate email format
        function validateEmail(email) {
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return emailRegex.test(email);
        }

        // Validate password
        function validatePassword(password) {
            return password.length >= 6;
        }

        // Show error message
        function showError(field, message) {
            const input = document.getElementById(field);
            const errorDiv = document.getElementById(field + 'Error');
            
            input.classList.add('error');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }

        // Clear error for specific field
        function clearError(event) {
            const field = event.target.id;
            const input = document.getElementById(field);
            const errorDiv = document.getElementById(field + 'Error');
            
            input.classList.remove('error');
            errorDiv.style.display = 'none';
        }

        // Clear all errors
        function clearAllErrors() {
            ['name', 'email', 'password', 'confirmPassword'].forEach(field => {
                const input = document.getElementById(field);
                const errorDiv = document.getElementById(field + 'Error');
                
                input.classList.remove('error');
                errorDiv.style.display = 'none';
            });
        }

        // Initialize when page loads
        document.addEventListener('DOMContentLoaded', initializeSignup);
    </script>
</body>
</html>
